<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NETSY - Central de Entretenimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <header class="border-b border-zinc-800 pb-4 mb-6">
        <h1 class="text-4xl font-black text-red-600">NETSY</h1>
        <p class="text-zinc-400">Sua central de filmes, séries e desenhos.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Card: Desenhos -->
        <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
            <h2 class="text-xl font-bold mb-2">👶 Desenhos Infantis</h2>
            <p class="text-sm text-zinc-400 mb-4">Peppa, Bita, Patati Patatá e mais.</p>
            <a href="https://www.youtube.com/results?search_query=desenhos+infantis+completos" target="_blank" class="block text-center bg-red-600 py-2 rounded-lg font-bold">Assistir Agora</a>
        </div>

        <!-- Card: Filmes -->
        <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
            <h2 class="text-xl font-bold mb-2">🎬 Filmes Gratuitos</h2>
            <p class="text-sm text-zinc-400 mb-4">Sucessos do cinema e clássicos.</p>
            <a href="https://play.mercadolivre.com.br" target="_blank" class="block text-center bg-red-600 py-2 rounded-lg font-bold">Ver Catálogo</a>
        </div>

        <!-- Card: Canais TV -->
        <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
            <h2 class="text-xl font-bold mb-2">📺 Canais de TV</h2>
            <p class="text-sm text-zinc-400 mb-4">Programação ao vivo e séries.</p>
            <a href="https://pluto.tv/pt/live-tv" target="_blank" class="block text-center bg-red-600 py-2 rounded-lg font-bold">Abrir TV ao Vivo</a>
        </div>
    </div>

    <footer class="mt-12 text-center text-zinc-600 text-xs">
        NETSY - Central de Entretenimento Familiar
    </footer>
</body>
</html>
