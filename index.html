                <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETSY - Filmes e Séries</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: black; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-black text-white">

    <!-- BARRA DE TOPO (HEADER) -->
    <header class="flex items-center justify-between px-8 py-6 border-b border-white/10">
        <h1 class="text-4xl font-black text-red-600">NETSY</h1>
        <div class="flex gap-4">
            <span class="bg-zinc-800 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center">Modo Administrador 🔓</span>
        </div>
    </header>

    <!-- BANNER PRINCIPAL -->
    <section class="relative h-[400px] flex items-center px-10 overflow-hidden">
        <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=1600&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-30" />
        <div class="relative z-10 max-w-2xl">
            <h2 class="text-5xl font-black leading-tight">Seu Catálogo Ativo</h2>
            <p class="text-lg text-white/80 mt-4">Clique em qualquer título abaixo para assistir ao conteúdo em tempo real.</p>
        </div>
    </section>

    <!-- PLAYER DE VÍDEO (Aparece quando clica no filme) -->
    <section id="videoPlayerSection" style="display: none;" class="px-8 py-8 bg-zinc-900 border-b border-white/10">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 id="playingTitle" class="text-2xl font-bold text-red-500">Assistindo</h3>
                <button onclick="fecharPlayer()" class="bg-red-600 text-white px-4 py-2 rounded-xl font-bold text-sm cursor-pointer">✕ Fechar Player</button>
            </div>
            <!-- O Player de Verdade -->
            <div class="relative pt-[56.25%] bg-black rounded-2xl overflow-hidden shadow-2xl">
                <iframe id="videoIframe" class="absolute inset-0 w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <!-- GRADE DE FILMES -->
    <section class="px-8 py-12">
        <h3 class="text-3xl font-black mb-8">Assistir Agora (Grátis)</h3>
        <div class="grid md:grid-cols-3 gap-8" id="moviesGrid"></div>
    </section>

    <script>
        // Lista de conteúdos com links REAIS do YouTube para rodar direto no site
        const movies = [
            { 
                title: 'Shrek - Especial', 
                image: 'https://images.unsplash.com/photo-1608889174639-41a41675a89b?q=80&w=600&auto=format&fit=crop',
                videoUrl: 'https://www.youtube.com/embed/CwXOrWv6YlY' // Link incorporado do Shrek
            },
            { 
                title: 'Peppa Pig Oficial', 
                image: 'https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?q=80&w=600&auto=format&fit=crop',
                videoUrl: 'https://www.youtube.com/embed/1B1GfcG9g_8' // Link oficial Peppa Pig
            },
            { 
                title: 'Animação e Histórias', 
                image: 'https://images.unsplash.com/photo-1620428268482-cf1851a36764?q=80&w=600&auto=format&fit=crop',
                videoUrl: 'https://www.youtube.com/embed/l847v7vI8L0' // Desenho infantil animado
            }
        ];

        const grid = document.getElementById('moviesGrid');
        const playerSection = document.getElementById('videoPlayerSection');
        const videoIframe = document.getElementById('videoIframe');
        const playingTitle = document.getElementById('playingTitle');

        if (grid) {
            grid.innerHTML = "";
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 rounded-3xl overflow-hidden hover:scale-105 transition duration-300 shadow-2xl cursor-pointer";
                card.innerHTML = `
                    <img src="${movie.image}" class="w-full h-52 object-cover" />
                    <div class="p-6">
                        <h4 class="text-xl font-bold text-white mb-4">${movie.title}</h4>
                        <button class="w-full bg-red-600 py-3 rounded-xl font-bold text-white uppercase text-sm tracking-wider">
                            ▶ Dar o Play
                        </button>
                    </div>
                `;
                card.addEventListener('click', () => darOPlay(movie.title, movie.videoUrl));
                grid.appendChild(card);
            });
        }

        function darOPlay(titulo, url) {
            if (playerSection && videoIframe && playingTitle) {
                playingTitle.innerText = "Assistindo agora: " + titulo;
                videoIframe.src = url + "?autoplay=1"; // Ativa o autoplay ao clicar
                playerSection.style.display = "block";
                // Rola a tela automaticamente para o player de vídeo
                playerSection.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function fecharPlayer() {
            if (playerSection && videoIframe) {
                videoIframe.src = ""; // Para o som do vídeo
                playerSection.style.display = "none";
            }
        }
    </script>
</body>
</html>
